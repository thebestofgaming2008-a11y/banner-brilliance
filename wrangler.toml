name = "fawzaanstore"
pages_build_output_dir = "dist"
compatibility_date = "2026-07-18"
compatibility_flags = ["nodejs_compat"]

[vars]
SITE_URL = "https://fawzaanstore.pages.dev"
PUBLIC_SITE_URL = "https://fawzaanstore.pages.dev"
VITE_PUBLIC_SITE_URL = "https://fawzaanstore.pages.dev"
CONVEX_URL = "https://steady-cobra-91.convex.cloud"
VITE_CONVEX_URL = "https://steady-cobra-91.convex.cloud"
VITE_CONVEX_SITE_URL = "https://steady-cobra-91.convex.site"

[observability]
enabled = true

[[r2_buckets]]
bucket_name = "fawzaanstore-product-media"
binding = "PRODUCT_MEDIA_BUCKET"
